<div class="login-container">
  <h2>Student Management Login</h2>
  <form (submit)="onLogin()">
    <div class="form-group">
      <label>Email:</label>
      <input type="email" [(ngModel)]="credentials.email" name="email" required class="form-control">
    </div>
    <div class="form-group">
      <label>Password:</label>
      <input type="password" [(ngModel)]="credentials.password" name="password" required class="form-control">
    </div>
    <button type="submit" class="btn-primary">Login</button>
  </form>
  <p>Don't have an account? <a routerLink="/signup">Sign up here</a></p>
</div>
